name: CD - atomic deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Atomic deploy
        run: |
          set -e
          echo "Starting atomic deployment..."

          APP_DIR=/var/www/devops-app
          RELEASES_DIR=$APP_DIR/releases
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP

          mkdir -p $RELEASES_DIR
          mkdir -p $NEW_RELEASE

          rsync -av --delete $GITHUB_WORKSPACE/ $NEW_RELEASE/

          ln -sfn $NEW_RELEASE $APP_DIR/current

          echo "Deployment finished. Current release: $NEW_RELEASE"

      - name: Restart service
        run: |
          sudo systemctl restart devops-app
          echo "Service restarted."

